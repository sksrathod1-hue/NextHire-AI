<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - NextHire AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/static/images/icon-192.jpg">
</head>
<body>

  <!-- Dynamic Film Grain Noise Overlay -->
  <div class="noise-overlay"></div>

  <!-- Shifting Liquid Aurora Backdrop -->
  <div class="aurora-backdrop">
    <div class="aurora-blob blob-mint"></div>
    <div class="aurora-blob blob-amethyst"></div>
    <div class="aurora-blob blob-chrome"></div>
  </div>
  <div class="cyber-lines"></div>

  <!-- Main Container -->
  <div class="auth-wrapper">
    <div class="card-3d-wrapper" style="max-width: 450px; display: flex; justify-content: center; width: 100%;">
      <div class="auth-card">
        <div class="auth-card-inner">
          <div class="auth-header">
            <a href="/" class="auth-logo">
              <div class="logo-circle"></div>
              <span class="logo-text">Next<span>Hire</span></span>
            </a>
            <h2>Welcome Back</h2>
            <p>Login to resume your career acceleration</p>
          </div>

          <!-- Login Form -->
          {% if error %}
          <div class="error-alert" style="margin-bottom: 15px; padding: 10px 14px; border-radius: 10px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171; font-size: 13px; font-weight: 500; text-align: center;">
            {{ error }}
          </div>
          {% endif %}
          <form class="auth-form" action="/login" method="POST">
            <div class="input-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" required placeholder="name@company.com">
            </div>

            <div class="input-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <div class="auth-options">
              <label class="checkbox-container">
                <input type="checkbox" name="remember">
                <span class="checkbox-checkmark"></span>
                Remember Me
              </label>
              <a href="#" class="forgot-pass-link" id="forgotPassBtn">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-auth-submit">Authenticate</button>
          </form>

          <!-- Social Logins -->
          <div class="auth-divider">
            <span>or continue with</span>
          </div>

          <div class="social-login-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
            <button type="button" class="btn-social-auth" id="googleLoginBtn" onclick="window.location.href='/login/google';">
              <!-- Google Icon SVG -->
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
              </svg>
              Google
            </button>
            <button class="btn-social-auth" id="githubLoginBtn" type="button">
              <!-- GitHub Icon SVG -->
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
              </svg>
              GitHub
            </button>
          </div>

          <div class="auth-footer">
            <p>New to NextHire? <a href="/signup">Create Account</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>

  <!-- Notification Toast -->
  <div class="toast-popup" id="toastBox">
    <div class="toast-icon-circle">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
      </svg>
    </div>
    <div class="toast-body">
      <span class="toast-head" id="toastTitle">SECURITY</span>
      <span class="toast-content" id="toastMessage">Quantum connection stabilized.</span>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
